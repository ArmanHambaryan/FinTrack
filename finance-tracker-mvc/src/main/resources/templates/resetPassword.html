<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page">
<div class="decor decor-1"></div>
<div class="decor decor-2"></div>

<main class="shell">
    <header class="topbar">
        <div class="brand">
            <span class="brand-mark"></span>
            <span th:text="#{app.title}">Finance Tracker</span>
        </div>
        <nav class="nav-links">
            <a class="pill" th:href="@{/loginPage}" th:text="#{nav.back.login}">Back to Login</a>
        </nav>
    </header>

    <section class="card form-card">
        <h1 class="form-title">Reset Password</h1>
        <p class="form-subtitle">Set a new password for your account.</p>

        <p class="alert error" th:if="${error}" th:text="${error}"></p>

        <form class="form-grid" th:action="@{/reset-password/{token}(token=${token})}" method="post">
            <label class="input-group">
                <span>New Password</span>
                <input class="input" type="password" name="newPassword" required>
            </label>

            <button class="btn btn-primary" type="submit">Update Password</button>
        </form>
    </section>
</main>
</body>
</html>
