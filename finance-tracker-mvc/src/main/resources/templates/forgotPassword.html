<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page">
<div class="decor decor-1"></div>
<div class="decor decor-2"></div>

<main class="shell">
    <header class="topbar">
        <div class="brand">
            <span class="brand-mark"></span>
            <span>Finance Tracker</span>
        </div>
        <nav class="nav-links">
            <a class="pill" th:href="@{/login}">Back to Login</a>
        </nav>
    </header>

    <section class="card form-card">
        <h1 class="form-title">Change Password</h1>
        <p class="form-subtitle">Update your credentials to keep your account secure.</p>

        <p class="alert error" th:if="${error}" th:text="${error}"></p>
        <p class="alert" th:if="${msg}" th:text="${msg}"></p>

        <form class="form-grid" th:action="@{/forgotPassword}" method="post">
            <label class="input-group">
                <span>Email</span>
                <input class="input" type="email" name="email" required>
            </label>

            <label class="input-group">
                <span>Old Password</span>
                <input class="input" type="password" name="oldPassword" required>
            </label>

            <label class="input-group">
                <span>New Password</span>
                <input class="input" type="password" name="newPassword" required>
            </label>

            <button class="btn btn-primary" type="submit">Change Password</button>
        </form>

        <p class="muted" style="margin-top: 18px;">
            Remembered your password? <a class="pill" th:href="@{/login}">Sign in</a>
        </p>
    </section>
</main>
</body>
</html>
