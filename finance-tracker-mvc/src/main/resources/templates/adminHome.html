<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Home</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page">
  <div class="decor decor-1"></div>
  <div class="decor decor-2"></div>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <span>Finance Tracker</span>
      </div>
      <nav class="nav-links">
        <span class="pill">Admin</span>
        <a href="/transaction">
          <button class="btn btn-secondary" type="button">Add Transaction</button>
        </a>
      </nav>
    </header>

    <section class="card panel center">
      <h1 class="section-title">Admin control room</h1>
      <p class="muted">Manage users, review goals, and keep the system healthy.</p>
      <div class="cta-row" style="justify-content: center; margin-top: 20px;">
        <span class="pill">Users</span>
        <span class="pill">Reports</span>
        <span class="pill">Settings</span>
      </div>
      <form class="logout-form" th:action="@{/logout}" method="post">
        <button class="btn btn-ghost" type="submit">Logout</button>
      </form>
    </section>

    <section class="card panel" style="margin-top: 24px;">
      <h2 class="section-title">User management</h2>
      <p class="muted">Review user status and manage access.</p>
      <ul class="goals-list">
        <li class="goal-item" th:if="${#lists.isEmpty(users)}">No users found.</li>
        <li class="goal-item" th:each="user : ${users}">
          <div>
            <div th:text="${user.email}">user@email.com</div>
            <div>
              <span th:if="${user.blocked}" style="color:red;">Blocked</span>
              <span th:if="${!user.blocked}" style="color:green;">Active</span>
              <span th:if="${user.updated_at != null and user.updated_at.isAfter(onlineCutoff)}" style="color:#4fd1c5; margin-left: 8px;">Online</span>
              <span th:if="${user.updated_at == null or !user.updated_at.isAfter(onlineCutoff)}" style="color:#b7c3da; margin-left: 8px;">Offline</span>
              <span th:if="${user.balance > highIncomeThreshold}" style="color:#ffb347; margin-left: 8px;">High income</span>
            </div>
            <div class="muted" th:text="'Balance: ' + ${user.balance}">Balance: 0</div>
          </div>
          <div class="cta-row">
            <form th:action="@{/admin/block/{id}(id=${user.id})}" method="post">
              <button type="submit">Block</button>
            </form>

            <form th:action="@{/admin/unblock/{id}(id=${user.id})}" method="post">
              <button type="submit">Unblock</button>
            </form>
          </div>
        </li>
      </ul>
    </section>
  </main>
</body>
</html>
