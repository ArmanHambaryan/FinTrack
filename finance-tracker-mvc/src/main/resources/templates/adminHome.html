<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Home</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page">
  <div class="decor decor-1"></div>
  <div class="decor decor-2"></div>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <span>Finance Tracker</span>
      </div>
      <nav class="nav-links">
        <span class="pill">Admin</span>
        <a href="/transaction">
          <button class="btn btn-secondary" type="button">Add Transaction</button>
        </a>
      </nav>
    </header>

    <section class="card panel center">
      <h1 class="section-title">Admin control room</h1>
      <p class="muted">Manage users, review goals, and keep the system healthy.</p>
      <div class="cta-row" style="justify-content: center; margin-top: 20px;">
        <span class="pill">Users</span>
        <span class="pill">Reports</span>
        <span class="pill">Settings</span>
      </div>
      <form class="logout-form" th:action="@{/logout}" method="post">
        <button class="btn btn-ghost" type="submit">Logout</button>
      </form>
    </section>
  </main>
</body>
</html>
