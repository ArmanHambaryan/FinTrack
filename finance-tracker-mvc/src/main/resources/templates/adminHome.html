<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page">
  <div class="settings">
    <button class="pill" type="button" data-settings-toggle aria-expanded="false">Settings</button>
    <div class="settings-panel" data-settings-panel hidden>
      <button class="pill theme-toggle" type="button" data-theme-toggle aria-pressed="false">
        <span class="theme-label">Light</span>
      </button>
      <form th:action="@{/logout}" method="post">
        <button class="btn btn-ghost" type="submit">Logout</button>
      </form>
    </div>
  </div>
  <div class="decor decor-1"></div>
  <div class="decor decor-2"></div>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <span>Finance Tracker</span>
      </div>
      <nav class="nav-links">
        <a class="pill" th:href="@{/admin/home}">Admin Home</a>
      </nav>
    </header>

    <section class="card panel">
      <h2 class="section-title">User management</h2>
      <p class="muted">Review user status and manage access.</p>
      <ul class="goals-list">
        <li class="goal-item" th:if="${#lists.isEmpty(users)}">No users found.</li>
        <li class="goal-item" th:each="user : ${users}">
          <div>
            <div th:text="${user.email}">user@email.com</div>
            <div>
              <span class="status offline" th:if="${user.blocked}">Blocked</span>
              <span class="status online"
                    th:if="${!user.blocked and user.lastActive != null and user.lastActive.isAfter(onlineCutoff)}">Online</span>
              <span class="status offline"
                    th:if="${!user.blocked and (user.lastActive == null or !user.lastActive.isAfter(onlineCutoff))}">Offline</span>
              <span class="status warning" th:if="${user.balance > highIncomeThreshold}">High income</span>
            </div>
            <div class="muted" th:text="'Balance: ' + ${user.balance}">Balance: 0</div>
          </div>
          <div class="cta-row">
            <form th:action="@{/admin/block/{id}(id=${user.id})}" method="post">
              <button class="btn btn-secondary" type="submit">Block</button>
            </form>

            <form th:action="@{/admin/unblock/{id}(id=${user.id})}" method="post">
              <button class="btn btn-ghost" type="submit">Unblock</button>
            </form>
          </div>
        </li>
      </ul>

      <div class="cta-row" style="margin-top: 16px;" th:if="${totalPages != null and totalPages > 1}">
        <a class="pill"
           th:if="${currentPage > 0}"
           th:href="@{/admin/home(page=${currentPage - 1})}">Previous</a>

        <span class="pill"
              th:each="pageNumber : ${#numbers.sequence(0, totalPages - 1)}"
              th:text="${pageNumber + 1}"
              th:style="${pageNumber == currentPage} ? 'font-weight:700; border-color:#4fd1c5;' : ''"></span>

        <a class="pill"
           th:if="${currentPage < totalPages - 1}"
           th:href="@{/admin/home(page=${currentPage + 1})}">Next</a>
      </div>
    </section>
  </main>
  <script>
    (() => {
      const settingsToggle = document.querySelector("[data-settings-toggle]");
      const settingsPanel = document.querySelector("[data-settings-panel]");
      const toggle = document.querySelector("[data-theme-toggle]");
      if (!toggle) return;
      const storageKey = "theme";
      const root = document.body;

      const applyTheme = (mode) => {
        const isLight = mode === "light";
        root.classList.toggle("theme-light", isLight);
        toggle.setAttribute("aria-pressed", String(isLight));
        const label = toggle.querySelector(".theme-label");
        if (label) {
          label.textContent = isLight ? "Dark" : "Light";
        }
      };

      const stored = localStorage.getItem(storageKey);
      const initial = stored ? stored : "dark";
      applyTheme(initial);

      if (settingsToggle && settingsPanel) {
        settingsToggle.addEventListener("click", () => {
          const isOpen = !settingsPanel.hasAttribute("hidden");
          settingsPanel.toggleAttribute("hidden", isOpen);
          settingsToggle.setAttribute("aria-expanded", String(!isOpen));
        });

        document.addEventListener("click", (event) => {
          if (!settingsPanel || settingsPanel.hasAttribute("hidden")) return;
          const target = event.target;
          if (settingsPanel.contains(target) || settingsToggle.contains(target)) return;
          settingsPanel.setAttribute("hidden", "");
          settingsToggle.setAttribute("aria-expanded", "false");
        });
      }

      toggle.addEventListener("click", () => {
        const next = root.classList.contains("theme-light") ? "dark" : "light";
        localStorage.setItem(storageKey, next);
        applyTheme(next);
      });
    })();
  </script>
</body>
</html>
