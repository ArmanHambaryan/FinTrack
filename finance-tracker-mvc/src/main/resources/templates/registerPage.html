<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page">
  <div class="decor decor-1"></div>
  <div class="decor decor-2"></div>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <span>Finance Tracker</span>
      </div>
      <nav class="nav-links">
        <button class="pill theme-toggle" type="button" data-theme-toggle aria-pressed="false">
          <span class="theme-label">Light</span>
        </button>
        <a class="pill" th:href="@{/loginPage}">Login</a>
      </nav>
    </header>

    <section class="card form-card">
      <h1 class="form-title">Create your account</h1>
      <p class="form-subtitle">Pick a role, set up your credentials, and get started.</p>
      <p class="alert" th:if="${msg}" th:text="${msg}"></p>
      <form class="form-grid" th:action="@{/register}" method="post">
        <label class="input-group">
          <span>Username</span>
          <input class="input" type="text" name="username" required>
        </label>
        <label class="input-group">
          <span>Email</span>
          <input class="input" type="email" name="email" required>
        </label>
        <label class="input-group">
          <span>Password</span>
          <input class="input" type="password" name="password" required>
        </label>
        <label class="input-group">
          <span>Role</span>
          <select class="input select" name="role">
            <option value="USER">User</option>
            <option value="ADMIN">Admin</option>
          </select>
        </label>
        <button class="btn btn-primary" type="submit">Register</button>
      </form>
      <p class="muted" style="margin-top: 18px;">
        Already have an account? <a class="pill" th:href="@{/loginPage}">Back to login</a>
      </p>
    </section>
  </main>
  <script>
    (() => {
      const toggle = document.querySelector("[data-theme-toggle]");
      if (!toggle) return;
      const storageKey = "theme";
      const root = document.body;

      const applyTheme = (mode) => {
        const isLight = mode === "light";
        root.classList.toggle("theme-light", isLight);
        toggle.setAttribute("aria-pressed", String(isLight));
        const label = toggle.querySelector(".theme-label");
        if (label) {
          label.textContent = isLight ? "Dark" : "Light";
        }
      };

      const stored = localStorage.getItem(storageKey);
      const initial = stored ? stored : "dark";
      applyTheme(initial);

      toggle.addEventListener("click", () => {
        const next = root.classList.contains("theme-light") ? "dark" : "light";
        localStorage.setItem(storageKey, next);
        applyTheme(next);
      });
    })();
  </script>
</body>
</html>
