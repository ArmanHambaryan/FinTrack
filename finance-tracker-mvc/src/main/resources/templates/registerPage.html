<!DOCTYPE html>
<html lang="en" th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="#{register.title}">Create Account</title>
  <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page">
  <div class="decor decor-1"></div>
  <div class="decor decor-2"></div>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <span th:text="#{app.title}">Finance Tracker</span>
      </div>
      <nav class="nav-links">
        <button class="pill theme-toggle" type="button" data-theme-toggle aria-pressed="false"
                th:attr="data-label-light=#{theme.light},data-label-dark=#{theme.dark}">
          <span class="theme-label" th:text="#{theme.light}">Light</span>
        </button>
        <a class="pill" th:href="@{/loginPage}" th:text="#{nav.login}">Login</a>
        <a class="pill" th:href="@{${currentUri}(lang='en')}" th:text="#{lang.en}">EN</a>
        <a class="pill" th:href="@{${currentUri}(lang='hy')}" th:text="#{lang.hy}">Հայ</a>
        <a class="pill" th:href="@{${currentUri}(lang='ru')}" th:text="#{lang.ru}">RU</a>
      </nav>
    </header>

    <section class="card form-card">
      <h1 class="form-title" th:text="#{register.heading}">Create your account</h1>
      <p class="form-subtitle" th:text="#{register.subtitle}">
        Pick a role, set up your credentials, and get started.
      </p>
      <p class="alert" th:if="${msg}" th:text="${msg}"></p>
      <form class="form-grid" th:action="@{/register}" method="post">
        <label class="input-group">
          <span th:text="#{register.username}">Username</span>
          <input class="input" type="text" name="username" required>
        </label>
        <label class="input-group">
          <span th:text="#{register.email}">Email</span>
          <input class="input" type="email" name="email" required>
        </label>
        <label class="input-group">
          <span th:text="#{register.password}">Password</span>
          <input class="input" type="password" name="password" required>
        </label>
        <label class="input-group">
          <span th:text="#{register.role}">Role</span>
          <select class="input select" name="role">
            <option value="USER" th:text="#{register.role.user}">User</option>
            <option value="ADMIN" th:text="#{register.role.admin}">Admin</option>
          </select>
        </label>
        <button class="btn btn-primary" type="submit" th:text="#{register.submit}">Register</button>
      </form>
      <p class="muted" style="margin-top: 18px;">
        <span th:text="#{register.have}">Already have an account?</span>
        <a class="pill" th:href="@{/loginPage}" th:text="#{register.back}">Back to login</a>
      </p>
    </section>
  </main>
  <script>
    (() => {
      const toggle = document.querySelector("[data-theme-toggle]");
      if (!toggle) return;
      const storageKey = "theme";
      const root = document.body;

      const applyTheme = (mode) => {
        const isLight = mode === "light";
        root.classList.toggle("theme-light", isLight);
        toggle.setAttribute("aria-pressed", String(isLight));
        const label = toggle.querySelector(".theme-label");
        if (label) {
          const lightLabel = toggle.dataset.labelLight || "Light";
          const darkLabel = toggle.dataset.labelDark || "Dark";
          label.textContent = isLight ? darkLabel : lightLabel;
        }
      };

      const stored = localStorage.getItem(storageKey);
      const initial = stored ? stored : "dark";
      applyTheme(initial);

      toggle.addEventListener("click", () => {
        const next = root.classList.contains("theme-light") ? "dark" : "light";
        localStorage.setItem(storageKey, next);
        applyTheme(next);
      });
    })();
  </script>
</body>
</html>
